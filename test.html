<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Piano - Glass Edition</title>
    <style>
        body { 
            margin: 0; 
            /* 使用漸層營造出一種深邃的通透感，而不是死黑 */
            background: linear-gradient(135deg, #2c3e50, #000000); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            touch-action: none;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 20px; 
        }

        .key {
            width: 75px; 
            height: 75px; 
            /* 透明白色背景 */
            background: rgba(255, 255, 255, 0.1); 
            /* 邊框增加發光感 */
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 16px;
            cursor: pointer; 
            transition: all 0.1s ease;
            -webkit-user-select: none; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* 核心：毛玻璃濾鏡 */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* 按下時的強烈發光 */
        .key.active { 
            background: rgba(255, 255, 255, 0.8); 
            transform: scale(0.9);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
            border-color: rgba(255, 255, 255, 1);
        }
    </style>
</head>
<body>
    <div class="grid" id="piano"></div>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const piano = document.getElementById('piano');
        const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50];

        notes.forEach((freq) => {
            const key = document.createElement('div');
            key.className = 'key';
            key.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.8);
                key.classList.add('active');
            });
            const release = () => key.classList.remove('active');
            key.addEventListener('pointerup', release);
            key.addEventListener('pointerleave', release);
            key.addEventListener('pointercancel', release);
            piano.appendChild(key);
        });
    </script>
</body>
</html>

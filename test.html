<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Music - 修復版</title>
    <style>
        :root { --bg-color: #121212; --key-color: rgba(255,255,255,0.2); }
        body { 
            margin: 0; background: var(--bg-color); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; font-family: sans-serif;
            touch-action: none; /* 核心：防止手機縮放與捲動 */
        }
        #status { margin-bottom: 20px; font-size: 1.2rem; }
        .grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; 
            perspective: 1000px;
        }
        .key {
            width: 65px; height: 65px; background: var(--key-color);
            border: 2px solid white; border-radius: 12px;
            cursor: pointer; transition: all 0.1s;
            -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        /* 按下時的發光效果 */
        .key.active { 
            background: white; transform: scale(0.9) translateZ(20px);
            box-shadow: 0 0 20px white;
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        button {
            padding: 15px 30px; font-size: 1.5rem; border: none;
            border-radius: 30px; cursor: pointer; background: white;
        }
    </style>
</head>
<body>

    <div id="overlay" class="overlay">
        <h2>Sky Piano</h2>
        <p>點擊按鈕開始（請確保開啟響鈴模式）</p>
        <button onclick="startApp()">開始演奏</button>
    </div>

    <div id="status">準備就緒</div>
    <div class="grid" id="piano"></div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const piano = document.getElementById('piano');
        const status = document.getElementById('status');
        
        // 光遇音階頻率 (C4 - C6)
        const notes = [
            261.63, 293.66, 329.63, 349.23, 392.00,
            440.00, 493.88, 523.25, 587.33, 659.25,
            698.46, 783.99, 880.00, 987.77, 1046.50
        ];

        function startApp() {
            audioCtx.resume();
            document.getElementById('overlay').style.display = 'none';
            initPiano();
        }

        function initPiano() {
            notes.forEach((freq, i) => {
                const key = document.createElement('div');
                key.className = 'key';
                
                // 關鍵：使用 pointerdown 支援多點觸控且無延遲
                key.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    playSound(freq);
                    key.classList.add('active');
                });

                // 移除效果
                const release = () => key.classList.remove('active');
                key.addEventListener('pointerup', release);
                key.addEventListener('pointerleave', release);
                key.addEventListener('pointercancel', release);

                piano.appendChild(key);
            });
            status.innerText = "演奏中 - 支援多指彈奏";
        }

        function playSound(freq) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            // 設置音色 (光遇風格建議用 triangle 或 sine)
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            // ADSR 緩衝，避免點擊雜音
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.8);
        }
    </script>
</body>
</html>
